<div class="container">
    <div class="header-section">
        <h1 data-key="appTitle">⚡ حاسبة مكثف التشغيل</h1>
        <p class="subtitle" data-key="appSubtitle">تحليل المحرك أحادي الطور</p>
    </div>

    <div class="form-grid">
        <div class="input-group">
            <label data-key="motor_hp">القدره الحصانيه للمحرك</label>
            <select id="hp_value">
                <option value="0.125">1/8 HP</option>
                <option value="0.25">1/4 HP</option>
                <option value="0.5" selected>1/2 HP</option>
                <option value="0.75">3/4 HP</option>
                <option value="1">1 HP</option>
            </select>
        </div>
        <div class="input-group">
            <label data-key="lblVoltage">الجهد (فولت)</label>
            <select id="motor_voltage">
                <option value="120">120V</option>
                <option value="240" selected>240V</option>
            </select>
        </div>
    </div>

    <button class="calculate-btn" onclick="calculateRunCap()" data-key="btnCalculate">⚡ احسب المكثف</button>

    <div class="result-box" id="runCapResultBox" style="display:none;">
        <div data-key="resultTitle" class="result-label">نتائج التحليل</div>
        <div class="res-val" id="uFResult">0 uF</div>
        
        <button class="print-btn" onclick="triggerPrint()" data-key="printBtn">
            🖨️ طباعة التقرير
        </button>
    </div>
</div>
